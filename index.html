<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사용한도 성분 퀴즈 | 맞춤형화장품 조제관리사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{
    --paper:#EFF2ED;
    --paper-dim:#E3E7DF;
    --ink:#122C2E;
    --ink-soft:#3E5457;
    --line:#C9D0C4;
    --amber:#B9832E;
    --amber-deep:#8C6222;
    --correct:#2E6B4F;
    --correct-bg:#DEEBE2;
    --wrong:#B5432E;
    --wrong-bg:#F3DFD8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Pretendard', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(18,44,46,0.035) 40px);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 18px 80px;
  }
  header.top{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:22px;
  }
  .doc-id{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    text-transform:uppercase;
  }
  h1{
    font-size:22px;
    line-height:1.35;
    margin:4px 0 0;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .badge-count{
    font-family:var(--mono);
    font-size:13px;
    border:1.5px solid var(--ink);
    border-radius:3px;
    padding:4px 8px;
    white-space:nowrap;
  }

  /* category chips */
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:22px;
  }
  .chip{
    font-family:var(--mono);
    font-size:12px;
    padding:6px 10px;
    border:1.5px solid var(--ink);
    border-radius:999px;
    background:transparent;
    cursor:pointer;
    color:var(--ink);
    transition:background .15s ease, color .15s ease;
  }
  .chip.active{
    background:var(--ink);
    color:var(--paper);
  }

  /* progress */
  .progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--amber);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }

  /* card */
  .card{
    background:#FBFBF9;
    border:1.5px solid var(--ink);
    border-radius:6px;
    padding:24px 20px;
    position:relative;
    box-shadow:4px 4px 0 rgba(18,44,46,0.08);
  }
  .cat-tag{
    display:inline-block;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.06em;
    color:var(--amber-deep);
    border:1px solid var(--amber);
    border-radius:3px;
    padding:2px 7px;
    margin-bottom:12px;
  }
  .q-text{
    font-size:17px;
    line-height:1.55;
    font-weight:600;
    margin:0 0 18px;
  }
  .q-text .num{
    font-family:var(--mono);
    color:var(--amber-deep);
    font-weight:700;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:9px;
  }
  .opt{
    display:flex;
    align-items:center;
    gap:10px;
    text-align:left;
    padding:12px 13px;
    border:1.5px solid var(--line);
    border-radius:5px;
    background:#fff;
    cursor:pointer;
    font-size:14.5px;
    font-family:var(--sans);
    color:var(--ink);
    transition:border-color .12s ease, background .12s ease;
  }
  .opt .letter{
    font-family:var(--mono);
    font-weight:700;
    font-size:13px;
    width:20px;
    height:20px;
    flex:none;
    border:1.5px solid var(--ink);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .opt:hover:not(.locked){
    border-color:var(--ink);
    background:var(--paper-dim);
  }
  .opt.locked{ cursor:default; }
  .opt.correct{
    background:var(--correct-bg);
    border-color:var(--correct);
    color:var(--correct);
  }
  .opt.correct .letter{ border-color:var(--correct); }
  .opt.wrong{
    background:var(--wrong-bg);
    border-color:var(--wrong);
    color:var(--wrong);
  }
  .opt.wrong .letter{ border-color:var(--wrong); }
  .opt.dim{ opacity:0.45; }

  /* stamp */
  .stamp-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:18px;
  }
  .stamp{
    font-family:var(--mono);
    font-weight:800;
    font-size:13px;
    letter-spacing:0.08em;
    padding:6px 12px;
    border:2.5px solid currentColor;
    border-radius:4px;
    transform:rotate(-4deg) scale(0.85);
    opacity:0;
    animation:stamp-in .28s ease forwards;
  }
  @keyframes stamp-in{
    to{ transform:rotate(-4deg) scale(1); opacity:1; }
  }
  .stamp.ok{ color:var(--correct); }
  .stamp.no{ color:var(--wrong); }

  /* explanation / comparison */
  .explain{
    margin-top:16px;
    padding-top:16px;
    border-top:1px dashed var(--line);
    font-size:13.5px;
    line-height:1.65;
    color:var(--ink-soft);
    display:none;
  }
  .explain.show{ display:block; }
  .explain b{ color:var(--ink); }
  .compare{
    margin-top:12px;
    border:1px solid var(--line);
    border-radius:5px;
    overflow:hidden;
  }
  .compare-title{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.05em;
    background:var(--ink);
    color:var(--paper);
    padding:6px 10px;
  }
  .compare table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  .compare td{
    padding:8px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .compare tr:last-child td{ border-bottom:none; }
  .compare td.label{
    width:38%;
    color:var(--ink-soft);
    font-weight:500;
  }
  .compare td.val{
    font-family:var(--mono);
    font-weight:700;
    color:var(--amber-deep);
  }

  .next-btn{
    margin-top:20px;
    width:100%;
    padding:13px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:5px;
    font-family:var(--sans);
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{ display:block; }
  .next-btn:active{ transform:translateY(1px); }

  /* results screen */
  .result{
    text-align:center;
    padding:30px 10px 10px;
  }
  .result .score{
    font-family:var(--mono);
    font-size:46px;
    font-weight:800;
    color:var(--amber-deep);
    margin:6px 0;
  }
  .result p{ color:var(--ink-soft); font-size:14px; line-height:1.6; }
  .restart-btn{
    margin-top:14px;
    padding:12px 22px;
    background:transparent;
    border:2px solid var(--ink);
    border-radius:5px;
    font-weight:700;
    font-family:var(--sans);
    cursor:pointer;
    color:var(--ink);
  }
  .missed-list{
    text-align:left;
    margin-top:22px;
    border-top:1px dashed var(--line);
    padding-top:16px;
  }
  .missed-item{
    font-size:13px;
    padding:8px 0;
    border-bottom:1px solid var(--paper-dim);
    color:var(--ink-soft);
  }
  .missed-item b{ color:var(--wrong); }

  footer{
    text-align:center;
    margin-top:26px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.7;
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="doc-id">MFDS · 화장품 안전기준 등에 관한 규정 별표2</div>
      <h1>사용한도 성분 암기 퀴즈</h1>
    </div>
    <div class="badge-count" id="totalBadge">0문항</div>
  </header>

  <div class="chips" id="chips"></div>

  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>

  <div class="card" id="quizCard"></div>

  <footer>정답 공개 시 헷갈리기 쉬운 성분을 함께 비교합니다.</footer>
</div>

<script>
const QUESTIONS = [
// ── 보존제 ─────────────────────────────
{cat:"보존제", q:"벤질알코올을 두발 염색용 제품류에 <b>용제</b>로 사용할 경우의 한도는?",
 opts:["1.0%","5.0%","10%","15%"], answer:2,
 explain:"벤질알코올은 기본 한도가 1.0%지만, 두발 염색용 제품에 <b>용제</b> 목적으로 쓸 때만 예외적으로 10%까지 허용돼요.",
 compare:[["일반 사용 한도","1.0%"],["두발 염색용 · 용제 목적","10%"]]},

{cat:"보존제", q:"살리실릭애씨드를 <b>보존제</b> 목적으로 사용할 때의 한도와, 사용할 수 없는 대상은?",
 opts:["0.5% / 영유아·13세 이하 대상 제품(샴푸 제외)","2.0% / 전 연령 사용금지","0.5% / 전 제품 사용 가능","3.0% / 샴푸만 사용금지"], answer:0,
 explain:"보존제 목적일 땐 0.5%. 영유아용·만 13세 이하 어린이 대상 제품엔 금지지만 <b>샴푸는 예외</b>로 사용 가능해요.",
 compare:[["보존제 목적","0.5%"],["인체 세정용(기타성분)","2%"],["씻어내는 두발용(기타성분)","3%"]]},

{cat:"보존제", q:"벤조익애씨드 및 그 염류의 기본 한도(산으로서)는?",
 opts:["0.2%","0.5%","1.0%","2.5%"], answer:1,
 explain:"기본 한도는 산으로서 0.5%. 다만 벤조익애씨드와 그 소듐염을 <b>씻어내는 제품</b>에 쓸 땐 2.5%까지 허용돼요.",
 compare:[["기본 한도","0.5%"],["벤조익애씨드·소듐염 + 씻어내는 제품","2.5%"]]},

{cat:"보존제", q:"클로르헥시딘을 두발용 제품에 사용할 때의 한도는?",
 opts:["0.05%","0.1%","0.3%","0.5%"], answer:3,
 explain:"클로르헥시딘은 대상에 따라 한도가 3단계로 나뉘어요. 두발용 제품이 가장 높은 0.5%예요.",
 compare:[["점막 미사용 + 씻어내는 제품","0.1%"],["기타 제품","0.05%"],["두발용 제품","0.5%"]]},

{cat:"보존제", q:"트리클로산의 '보존제' 규정상, 사용이 허용되는 제품 유형이 <b>아닌</b> 것은?",
 opts:["씻어내는 인체세정용 제품","데오도란트(스프레이 제외)","페이스파우더","에어로졸(스프레이) 데오도란트"], answer:3,
 explain:"트리클로산 0.3%는 씻어내는 인체세정용, 데오도란트(스프레이 제외), 페이스파우더, 블레미쉬 컨실러에만 허용돼요. <b>스프레이형 데오도란트는 제외</b>예요.",
 compare:[["보존제 표 한도","0.3% (지정 제품군 한정)"],["기타성분 표 규정","기능성 유효성분 목적 외 사용금지"]]},

{cat:"보존제", q:"p-하이드록시벤조익애씨드류를 <b>혼합 사용</b>할 경우(산으로서)의 한도는?",
 opts:["0.4%","0.6%","0.8%","1.0%"], answer:2,
 explain:"단일성분이면 0.4%, 두 종류 이상을 혼합해서 사용하면 0.8%까지 허용돼요. 숫자가 정확히 2배 관계라는 점을 기억하면 좋아요.",
 compare:[["단일성분","0.4%"],["혼합사용","0.8%"]]},

{cat:"보존제", q:"징크피리치온을 씻어내는 일반 제품과, 샴푸·린스·탈모기능성화장품에 사용할 때 한도가 다릅니다. 샴푸 등에서의 한도는?",
 opts:["0.5%","0.8%","1.0%","1.5%"], answer:2,
 explain:"일반적으로 씻어내는 제품은 0.5%지만, 샴푸·린스·탈모기능성화장품은 1.0%까지 허용돼요.",
 compare:[["씻어내는 일반 제품","0.5%"],["샴푸·린스·탈모기능성화장품","1.0%"]]},

{cat:"보존제", q:"메칠이소치아졸리논(MIT) 단독 사용 시, 허용되는 제품과 한도는?",
 opts:["모든 제품에 0.1%","씻어내는 제품에 0.0015%","안 씻어내는 제품에 0.01%","전 제품 사용금지"], answer:1,
 explain:"MIT 단독은 씻어내는 제품에만 0.0015% 허용, 기타 제품엔 금지예요. MCI/MI 혼합물(3:1)도 같은 0.0015%지만 <b>MIT 단독과 병행 사용은 금지</b>라는 점이 핵심 함정이에요.",
 compare:[["MIT 단독","씻어내는 제품 0.0015%"],["MCI/MI 혼합물(3:1)","씻어내는 제품 0.0015%"]]},

{cat:"보존제", q:"아이오도프로피닐부틸카바메이트(IPBC)를 데오도란트에 배합할 경우의 한도는?",
 opts:["0.01%","0.0075%","0.02%","0.05%"], answer:1,
 explain:"IPBC는 씻어내는 제품 0.02%, 안 씻어내는 제품 0.01%가 기본이지만, <b>데오도란트</b>는 별도로 더 낮은 0.0075%예요.",
 compare:[["씻어내는 제품","0.02%"],["안 씻어내는 제품","0.01%"],["데오도란트 배합 시","0.0075%"]]},

// ── 자외선 차단 성분 ─────────────────────────────
{cat:"자외선차단", q:"벤조페논-3(옥시벤존)의 얼굴·손·입술용 제품 한도는?",
 opts:["2.4%","4.0%","5.0%","6.0%"], answer:2,
 explain:"기본 한도 2.4%보다 얼굴·손·입술에 사용되는 제품은 <b>더 높은</b> 5%까지 허용돼요. (역방향으로 헷갈리기 쉬운 부분!)",
 compare:[["기본 한도","2.4%"],["얼굴·손·입술용 제품","5%"]]},

{cat:"자외선차단", q:"드로메트리졸과 드로메트리졸트리실록산의 사용한도를 각각 바르게 짝지은 것은?",
 opts:["1.0% / 15%","5.0% / 10%","15% / 1.0%","10% / 5.0%"], answer:0,
 explain:"이름이 비슷해서 헷갈리기 쉬워요. <b>드로메트리졸</b>은 1.0%, <b>드로메트리졸트리실록산</b>은 15%로 큰 차이가 나요.",
 compare:[["드로메트리졸","1.0%"],["드로메트리졸트리실록산","15%"]]},

{cat:"자외선차단", q:"징크옥사이드와 티타늄디옥사이드(무기 자외선차단제)의 공통 사용한도는?",
 opts:["10%","15%","20%","25%"], answer:3,
 explain:"두 무기차단제 모두 25%로 동일해요. 유기차단제들보다 대체로 높은 한도를 가진다는 점도 함께 기억해두면 좋아요.",
 compare:[["징크옥사이드","25%"],["티타늄디옥사이드","25%"]]},

{cat:"자외선차단", q:"에칠헥실메톡시신나메이트의 사용한도는?",
 opts:["5%","7.5%","8%","10%"], answer:1,
 explain:"7.5%예요. 비슷한 이름의 이소아밀-p-메톡시신나메이트(10%), 에칠헥실다이메칠파바(8%)와 숫자를 혼동하지 않도록 주의하세요.",
 compare:[["에칠헥실메톡시신나메이트","7.5%"],["에칠헥실다이메칠파바","8%"],["이소아밀-p-메톡시신나메이트","10%"]]},

{cat:"자외선차단", q:"트리스-비페닐 트리아진을 에어로졸(스프레이) 제품에 사용하는 것은?",
 opts:["10% 이하면 가능","나노입자면 가능","사용금지","펌프스프레이만 가능"], answer:2,
 explain:"한도는 10%지만 에어로졸(<b>펌프스프레이 포함</b>) 제품에는 형태와 무관하게 전면 사용금지예요. 나노입자 사용 시엔 입도 중앙값 80nm 초과 및 순도 98% 이상 조건도 별도로 있어요.",
 compare:[["일반 한도","10%"],["에어로졸(펌프스프레이 포함)","사용금지"]]},

let currentFilter = "전체";
let order = [];
let idx = 0;
let score = 0;
let answered = false;
let missed = [];

const categories = ["전체", ...Array.from(new Set(QUESTIONS.map(q=>q.cat)))];

function buildChips(){
  const chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = "";
  categories.forEach(cat=>{
    const b = document.createElement('button');
    b.className = 'chip' + (cat===currentFilter ? ' active' : '');
    b.textContent = cat;
    b.onclick = ()=>{ currentFilter = cat; startQuiz(); };
    chipsEl.appendChild(b);
  });
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(){
  const pool = currentFilter==="전체" ? QUESTIONS : QUESTIONS.filter(q=>q.cat===currentFilter);
  order = shuffle(pool.map((_,i)=>i)).map(i=>pool[i]);
  idx = 0; score = 0; missed = [];
  document.getElementById('totalBadge').textContent = order.length + "문항";
  buildChips();
  renderQuestion();
}

function renderQuestion(){
  answered = false;
  const card = document.getElementById('quizCard');
  if(idx >= order.length){ renderResult(); return; }
  const q = order[idx];
  document.getElementById('progressFill').style.width = (idx/order.length*100)+"%";
  document.getElementById('progressLabel').textContent = (idx+1)+" / "+order.length;

  const optLetters = ["A","B","C","D"];
  card.innerHTML = `
    <span class="cat-tag">${q.cat}</span>
    <p class="q-text"><span class="num">Q${idx+1}.</span> ${q.q}</p>
    <div class="options" id="optionsBox">
      ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="letter">${optLetters[i]}</span><span>${o}</span></button>`).join("")}
    </div>
    <div class="explain" id="explainBox"></div>
    <button class="next-btn" id="nextBtn">${idx+1===order.length ? "결과 보기" : "다음 문제"}</button>
  `;

  card.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=> selectOption(btn, q));
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    idx++; renderQuestion();
  });
}

function selectOption(btn, q){
  if(answered) return;
  answered = true;
  const chosen = parseInt(btn.dataset.i);
  const correct = q.answer;
  const isRight = chosen === correct;
  if(isRight) score++; else missed.push(q);

  document.querySelectorAll('.opt').forEach(o=>{
    o.classList.add('locked');
    const i = parseInt(o.dataset.i);
    if(i===correct) o.classList.add('correct');
    else if(i===chosen) o.classList.add('wrong');
    else o.classList.add('dim');
  });

  const explainBox = document.getElementById('explainBox');
  let compareHtml = "";
  if(q.compare && q.compare.length){
    compareHtml = `
      <div class="compare">
        <div class="compare-title">비교표 · 헷갈리기 쉬운 수치</div>
        <table>
          ${q.compare.map(([label,val])=>`<tr><td class="label">${label}</td><td class="val">${val}</td></tr>`).join("")}
        </table>
      </div>`;
  }
  explainBox.innerHTML = `
    <div class="stamp-row">
      <span class="stamp ${isRight?'ok':'no'}">${isRight?'정답':'오답'}</span>
    </div>
    <div>${q.explain}</div>
    ${compareHtml}
  `;
  explainBox.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}

function renderResult(){
  document.getElementById('progressFill').style.width = "100%";
  document.getElementById('progressLabel').textContent = order.length+" / "+order.length;
  const card = document.getElementById('quizCard');
  const pct = Math.round(score/order.length*100);
  let comment = "처음 시작이 반이에요. 오답노트로 다시 훑어보세요.";
  if(pct>=90) comment = "완벽에 가까워요! 실전 감각 유지만 하면 돼요.";
  else if(pct>=70) comment = "탄탄해요. 아래 오답만 한 번 더 짚어보세요.";
  else if(pct>=50) comment = "절반 이상은 잡았어요. 비교표 위주로 복습해보세요.";

  card.innerHTML = `
    <div class="result">
      <div class="doc-id">RESULT</div>
      <div class="score">${score} / ${order.length}</div>
      <p>${comment}</p>
      <button class="restart-btn" id="restartBtn">다시 풀기</button>
      ${missed.length ? `<div class="missed-list"><div class="doc-id">오답 노트</div>` +
        missed.map(m=>`<div class="missed-item"><b>${m.cat}</b> · ${m.q.replace(/<[^>]*>/g,"")}</div>`).join("") +
        `</div>` : ""}
    </div>
  `;
  document.getElementById('restartBtn').addEventListener('click', startQuiz);
}

startQuiz();
</script>
